apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lab
  labels:
    app: backend
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: backend
        tier: backend
    spec:
      serviceAccountName: backend-sa
      initContainers:
        - name: init-data
          image: 366554472163.dkr.ecr.ap-northeast-3.amazonaws.com/kaniko-backend:72
          command:
            - sh
            - -c
            - |
              echo '{"status":"ok","service":"backend","records":[{"id":1,"value":"Record A"},{"id":2,"value":"Record B"},{"id":3,"value":"Record C"}]}' > /data/data.json
              echo "Dummy data written to /data/data.json"
          volumeMounts:
            - name: backend-data
              mountPath: /data
      containers:
        - name: backend
          image: 366554472163.dkr.ecr.ap-northeast-3.amazonaws.com/kaniko-backend:72
          command:
            - sh
            - -c
            - |
              echo "Backend started. Serving data from /data/data.json"
              while true; do
                response=$(cat /data/data.json)
                printf "HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n${response}" | nc -l -p 8080 -q 1
              done
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: BACKEND_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: BACKEND_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
          volumeMounts:
            - name: backend-data
              mountPath: /data
      volumes:
        - name: backend-data
          emptyDir: {}
